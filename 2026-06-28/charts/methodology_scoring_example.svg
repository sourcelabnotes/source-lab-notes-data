<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">How Source Lab Notes Scores One Crypto Signal</title>
  <desc id="desc">A worked example showing price at signal, later price, raw move, estimated costs, and final result after costs.</desc>
  <rect width="1600" height="900" fill="#f8fafc"/>
  <rect x="38" y="34" width="1524" height="832" rx="32" fill="#ffffff" stroke="#dbe3ea" stroke-width="2"/>

  <text x="80" y="102" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800" fill="#111827">How One Signal Becomes A Score</text>
  <text x="80" y="150" font-family="Inter, Arial, sans-serif" font-size="25" fill="#475569">Record first. Wait. Subtract costs. Then count the result.</text>

  <g transform="translate(80 218)">
    <rect width="252" height="242" rx="24" fill="#ecfeff" stroke="#0891b2" stroke-width="4"/>
    <text x="28" y="50" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#0f172a">1. Record</text>
    <text x="28" y="91" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="900" fill="#0e7490">$100.00</text>
    <text x="28" y="128" font-family="Inter, Arial, sans-serif" font-size="22" fill="#334155">price at signal</text>
    <text x="28" y="170" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Source pattern visible</text>
    <text x="28" y="202" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Timestamp saved</text>
  </g>

  <path d="M352 339 L420 339" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
  <path d="M420 339 L399 325 L399 353 Z" fill="#94a3b8"/>

  <g transform="translate(440 218)">
    <rect width="252" height="242" rx="24" fill="#eef2ff" stroke="#4f46e5" stroke-width="4"/>
    <text x="28" y="50" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#0f172a">2. Wait</text>
    <text x="28" y="91" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="900" fill="#4338ca">4 hours</text>
    <text x="28" y="128" font-family="Inter, Arial, sans-serif" font-size="22" fill="#334155">stated window</text>
    <text x="28" y="170" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Later price:</text>
    <text x="28" y="206" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#4338ca">$101.10</text>
  </g>

  <path d="M712 339 L780 339" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
  <path d="M780 339 L759 325 L759 353 Z" fill="#94a3b8"/>

  <g transform="translate(800 218)">
    <rect width="252" height="242" rx="24" fill="#f0fdf4" stroke="#16a34a" stroke-width="4"/>
    <text x="28" y="50" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#0f172a">3. Measure</text>
    <text x="28" y="91" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="900" fill="#15803d">+1.10%</text>
    <text x="28" y="128" font-family="Inter, Arial, sans-serif" font-size="22" fill="#334155">raw move</text>
    <text x="28" y="170" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Before trading costs</text>
    <text x="28" y="202" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Before any verdict</text>
  </g>

  <path d="M1072 339 L1140 339" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
  <path d="M1140 339 L1119 325 L1119 353 Z" fill="#94a3b8"/>

  <g transform="translate(1160 218)">
    <rect width="280" height="242" rx="24" fill="#fff7ed" stroke="#f97316" stroke-width="4"/>
    <text x="28" y="50" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#0f172a">4. Subtract</text>
    <text x="28" y="91" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="900" fill="#c2410c">-0.25 pts</text>
    <text x="28" y="128" font-family="Inter, Arial, sans-serif" font-size="22" fill="#334155">estimated costs</text>
    <text x="28" y="170" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Spread, slippage, drag</text>
    <text x="28" y="202" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">No free win</text>
  </g>

  <g transform="translate(210 560)">
    <rect width="1180" height="166" rx="28" fill="#ecfdf5" stroke="#059669" stroke-width="4"/>
    <text x="34" y="52" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#0f172a">5. The scorecard counts only the after-cost result</text>
    <text x="34" y="108" font-family="Inter, Arial, sans-serif" font-size="50" font-weight="900" fill="#047857">+0.85% after costs</text>
    <text x="34" y="151" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="900" fill="#047857">+$85 on a hypothetical $10,000 test</text>
  </g>

  <text x="80" y="798" font-family="Inter, Arial, sans-serif" font-size="23" fill="#475569">Worked scoring example. One example is not proof. Many timestamped examples make the scorecard.</text>
  <text x="80" y="834" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f766e">CSV: methodology_scoring_example.csv</text>
  <text x="1520" y="834" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#64748b" text-anchor="end">Research only - not investment advice</text>
</svg>
